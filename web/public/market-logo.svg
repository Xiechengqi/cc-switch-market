<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cc-switch Market logo">
  <!-- 阴影 -->
  <circle cx="44" cy="44" r="30" fill="#1E293B"/>
  <!-- 贴纸底层（琥珀） -->
  <circle cx="43" cy="43" r="30" fill="#FBBF24" stroke="#1E293B" stroke-width="2"/>
  <!-- 主硬币（紫） -->
  <circle cx="40" cy="40" r="30" fill="#8B5CF6" stroke="#1E293B" stroke-width="2"/>
  <!-- 字母 M -->
  <text x="40" y="52" text-anchor="middle"
        font-family="Outfit, system-ui, sans-serif" font-weight="800"
        font-size="36" fill="#FFFFFF">M</text>
  <!-- confetti 三角 -->
  <polygon points="68,8 76,22 60,22"
           fill="#F472B6" stroke="#1E293B" stroke-width="2"
           transform="rotate(18 68 15)"/>
</svg>
